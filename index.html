<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>멋재이 루틴 허브</title>
  <style>
    :root{
      --bg:#0b1020;
      --bg2:#111827;
      --card:rgba(255,255,255,0.08);
      --card2:rgba(255,255,255,0.05);
      --line:rgba(255,255,255,0.12);
      --text:#f8fafc;
      --muted:#cbd5e1;
      --accent:#8b5cf6;
      --accent2:#22c55e;
      --accent3:#38bdf8;
      --shadow:0 20px 50px rgba(0,0,0,.35);
      --radius:28px;
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      background:linear-gradient(180deg,var(--bg),#0f172a 55%, #0b1220);
      color:var(--text);
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }

    body{
      min-height:100vh;
    }

    .wrap{
      max-width:520px;
      margin:0 auto;
      padding:24px 16px 40px;
    }

    .hero{
      text-align:left;
      margin-bottom:20px;
    }

    .badge{
      display:inline-block;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(139,92,246,.18);
      border:1px solid var(--line);
      font-size:12px;
      font-weight:800;
      margin-bottom:14px;
    }

    h1{
      margin:0 0 10px;
      font-size:30px;
      line-height:1.2;
      letter-spacing:-0.5px;
    }

    .sub{
      margin:0;
      color:var(--muted);
      font-size:14px;
      line-height:1.7;
    }

    .grid{
      display:grid;
      gap:14px;
      margin-top:22px;
    }

    .card{
      display:block;
      text-decoration:none;
      color:inherit;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:18px;
      box-shadow:var(--shadow);
      transition:transform .18s ease, border-color .18s ease, background .18s ease;
    }

    .card:active{
      transform:scale(.985);
    }

    .card:hover{
      border-color:rgba(255,255,255,.2);
      background:rgba(255,255,255,.1);
    }

    .top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:10px;
    }

    .icon{
      width:52px;
      height:52px;
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:24px;
      font-weight:900;
      border:1px solid var(--line);
      flex-shrink:0;
    }

    .icon.workout{
      background:rgba(34,197,94,.16);
    }

    .icon.wellness{
      background:rgba(139,92,246,.18);
    }

    .label{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      font-size:11px;
      font-weight:900;
      border:1px solid var(--line);
      color:#fff;
      margin-bottom:10px;
    }

    .green{
      background:rgba(34,197,94,.18);
    }

    .purple{
      background:rgba(139,92,246,.18);
    }

    .title{
      font-size:22px;
      font-weight:900;
      margin:0 0 8px;
      letter-spacing:-0.3px;
    }

    .desc{
      margin:0;
      color:#e2e8f0;
      font-size:14px;
      line-height:1.7;
    }

    .points{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:14px;
    }

    .point{
      font-size:12px;
      color:var(--muted);
      background:var(--card2);
      border:1px solid var(--line);
      border-radius:999px;
      padding:7px 10px;
    }

    .go{
      margin-top:16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-size:14px;
      font-weight:800;
      color:#fff;
    }

    .arrow{
      font-size:18px;
      opacity:.9;
    }

    .footer{
      margin-top:18px;
      padding:14px 4px 0;
      color:var(--muted);
      font-size:12px;
      line-height:1.7;
      text-align:center;
    }

    @media (max-width:420px){
      h1{font-size:27px}
      .title{font-size:20px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="badge">멋재이 전용 루틴 허브</div>
      <h1>오늘 필요한 루틴을<br>바로 선택해</h1>
      <p class="sub">
        운동 루틴과 웰니스 루틴을 따로 나눠서
        더 보기 쉽게 정리한 메인 화면이야.
      </p>
    </section>

    <section class="grid">
      <a class="card" href="index-badge-up.html">
        <div class="top">
          <div>
            <div class="label green">운동 섹션</div>
            <h2 class="title">운동 루틴</h2>
          </div>
          <div class="icon workout">💪</div>
        </div>

        <p class="desc">
          홈 운동, 타이머, 루틴 진행,
          운동 흐름을 바로 시작하는 화면.
        </p>

        <div class="points">
          <span class="point">운동 시작</span>
          <span class="point">타이머</span>
          <span class="point">집중 루틴</span>
        </div>

        <div class="go">
          <span>운동 루틴 열기</span>
          <span class="arrow">→</span>
        </div>
      </a>

      <a class="card" href="wellness-routine.html">
        <div class="top">
          <div>
            <div class="label purple">웰니스 섹션</div>
            <h2 class="title">웰니스 루틴</h2>
          </div>
          <div class="icon wellness">🌙</div>
        </div>

        <p class="desc">
          저속노화, 이명, 수면, 보충제,
          주간 건강 루틴을 한눈에 보는 화면.
        </p>

        <div class="points">
          <span class="point">저속노화</span>
          <span class="point">이명 관리</span>
          <span class="point">수면 안정</span>
        </div>

        <div class="go">
          <span>웰니스 루틴 열기</span>
          <span class="arrow">→</span>
        </div>
      </a>
    </section>

    <div class="footer">
      메인에서 원하는 루틴을 선택해서 바로 들어가면 돼.
    </div>
  </div>
</body>
</html>
