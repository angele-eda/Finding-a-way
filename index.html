<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>디버깅 코드 사진 기록장</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
    }
    header {
      padding: 16px 20px;
      border-bottom: 1px solid #1f2937;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    header h1 {
      margin: 0;
      font-size: 18px;
    }
    header span {
      font-size: 12px;
      color: #9ca3af;
    }
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px;
    }
    .card {
      background: #020617;
      border-radius: 12px;
      padding: 16px;
      border: 1px solid #1f2937;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }
    .card + .card { margin-top: 16px; }

    .form-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 12px;
    }
    label {
      font-size: 13px;
      color: #9ca3af;
    }
    input[type="text"],
    textarea {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #374151;
      background: #020617;
      color: #e5e7eb;
      font-size: 14px;
    }
    textarea {
      min-height: 60px;
      resize: vertical;
    }
    input[type="file"] {
      font-size: 12px;
      color: #e5e7eb;
    }

    .hint {
      font-size: 11px;
      color: #6b7280;
    }

    .btn-row {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 8px;
    }
    button {
      border: none;
      border-radius: 999px;
      padding: 8px 16px;
      font-size: 13px;
      cursor: pointer;
      background: #3b82f6;
      color: white;
      font-weight: 600;
    }
    button.secondary {
      background: #111827;
      color: #9ca3af;
      border: 1px solid #374151;
    }
    button:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-top: 12px;
    }

    .item {
      background: #020617;
      border-radius: 10px;
      border: 1px solid #1f2937;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .item-img-wrap {
      max-height: 220px;
      overflow: hidden;
      background: #020617;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .item img {
      width: 100%;
      display: block;
      object-fit: contain;
    }
    .item-body {
      padding: 10px;
      font-size: 13px;
    }
    .item-title {
      font-weight: 600;
      margin-bottom: 4px;
    }
    .item-meta {
      font-size: 11px;
      color: #6b7280;
      margin-bottom: 4px;
    }
    .item-note {
      font-size: 12px;
      color: #d1d5db;
      white-space: pre-wrap;
    }
    .item-footer {
      display: flex;
      justify-content: flex-end;
      padding: 6px 8px 8px;
    }
    .item-footer button {
      padding: 4px 10px;
      font-size: 11px;
    }

    .empty {
      margin-top: 8px;
      font-size: 13px;
      color: #6b7280;
      text-align: center;
    }

    @media (max-width: 600px) {
      header h1 {
        font-size: 16px;
      }
      main {
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>디버깅 코드 사진 기록장</h1>
      <span>버그 상황을 사진으로 찍어서 모아두는 개인 노트</span>
    </div>
  </header>

  <main>
    <!-- 업로드 카드 -->
    <section class="card">
      <form id="uploadForm">
        <div class="form-row">
          <label for="title">제목 / 상황 요약</label>
          <input id="title" type="text" placeholder="예: React에서 setState 이후 값이 안 바뀜" />
        </div>

        <div class="form-row">
          <label for="note">메모 (선택)</label>
          <textarea id="note" placeholder="어떤 상황에서 버그가 발생했는지, 시도한 해결 방법 등 메모를 남겨두세요."></textarea>
        </div>

        <div class="form-row">
          <label for="image">
            디버깅 화면 사진
          </label>
          <!-- capture 속성: 모바일에서 카메라 바로 열리도록 -->
          <input id="image" type="file" accept="image/*" capture="environment" />
          <div class="hint">
            📸 휴대폰이면 카메라가 바로 열립니다.  
            PC에서는 스크린샷 파일을 선택하면 됩니다.
          </div>
        </div>

        <div class="btn-row">
          <button type="button" class="secondary" id="clearAllBtn">전체 삭제</button>
          <button type="submit" id="saveBtn">저장하기</button>
        </div>
      </form>
    </section>

    <!-- 갤러리 카드 -->
    <section class="card">
      <h2 style="margin-top:0; font-size:15px;">저장된 디버깅 사진들</h2>
      <div id="gallery" class="gallery"></div>
      <div id="emptyMsg" class="empty">아직 저장된 사진이 없습니다.</div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "debugPhotos_v1";

    const uploadForm = document.getElementById("uploadForm");
    const titleInput = document.getElementById("title");
    const noteInput = document.getElementById("note");
    const imageInput = document.getElementById("image");
    const galleryEl = document.getElementById("gallery");
    const emptyMsgEl = document.getElementById("emptyMsg");
    const clearAllBtn = document.getElementById("clearAllBtn");
    const saveBtn = document.getElementById("saveBtn");

    function loadPhotos() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return [];
        return JSON.parse(raw);
      } catch (e) {
        console.error("load error", e);
        return [];
      }
    }

    function savePhotos(list) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
    }

    function formatDate(ts) {
      const d = new Date(ts);
      const yy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const dd = String(d.getDate()).padStart(2, "0");
      const hh = String(d.getHours()).padStart(2, "0");
      const mi = String(d.getMinutes()).padStart(2, "0");
      return `${yy}-${mm}-${dd} ${hh}:${mi}`;
    }

    function render() {
      const photos = loadPhotos();
      galleryEl.innerHTML = "";
      if (photos.length === 0) {
        emptyMsgEl.style.display = "block";
        return;
      }
      emptyMsgEl.style.display = "none";

      photos
        .sort((a, b) => b.createdAt - a.createdAt)
        .forEach((p) => {
          const item = document.createElement("div");
          item.className = "item";

          const imgWrap = document.createElement("div");
          imgWrap.className = "item-img-wrap";
          const img = document.createElement("img");
          img.src = p.dataUrl;
          img.alt = p.title || "디버깅 사진";
          imgWrap.appendChild(img);

          const body = document.createElement("div");
          body.className = "item-body";

          const title = document.createElement("div");
          title.className = "item-title";
          title.textContent = p.title || "(제목 없음)";

          const meta = document.createElement("div");
          meta.className = "item-meta";
          meta.textContent = `촬영/저장 시각: ${formatDate(p.createdAt)}`;

          const note = document.createElement("div");
          note.className = "item-note";
          note.textContent = p.note || "";

          body.appendChild(title);
          body.appendChild(meta);
          if (p.note) body.appendChild(note);

          const footer = document.createElement("div");
          footer.className = "item-footer";
          const delBtn = document.createElement("button");
          delBtn.className = "secondary";
          delBtn.textContent = "삭제";
          delBtn.addEventListener("click", () => {
            const remain = loadPhotos().filter((x) => x.id !== p.id);
            savePhotos(remain);
            render();
          });
          footer.appendChild(delBtn);

          item.appendChild(imgWrap);
          item.appendChild(body);
          item.appendChild(footer);

          galleryEl.appendChild(item);
        });
    }

    uploadForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const file = imageInput.files[0];

      if (!file) {
        alert("디버깅 사진을 선택하거나 촬영해 주세요.");
        return;
      }

      saveBtn.disabled = true;
      saveBtn.textContent = "저장 중...";

      const reader = new FileReader();
      reader.onload = () => {
        const photos = loadPhotos();
        const newItem = {
          id: Date.now().toString() + Math.random().toString(16).slice(2),
          title: titleInput.value.trim(),
          note: noteInput.value.trim(),
          dataUrl: reader.result,
          createdAt: Date.now()
        };
        photos.push(newItem);
        savePhotos(photos);
        render();

        // 폼 리셋
        titleInput.value = "";
        noteInput.value = "";
        imageInput.value = "";
        saveBtn.disabled = false;
        saveBtn.textContent = "저장하기";
      };
      reader.onerror = () => {
        alert("이미지 읽기 중 오류가 발생했습니다.");
        saveBtn.disabled = false;
        saveBtn.textContent = "저장하기";
      };
      reader.readAsDataURL(file);
    });

    clearAllBtn.addEventListener("click", () => {
      if (!confirm("정말로 모든 디버깅 사진을 삭제할까요?")) return;
      localStorage.removeItem(STORAGE_KEY);
      render();
    });

    // 초기 렌더링
    render();
  </script>
</body>
</html>
