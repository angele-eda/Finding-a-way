<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>멋재이 루틴 허브</title>
  <style>
    :root{
      --bg:#0b1020;
      --card:rgba(255,255,255,0.08);
      --line:rgba(255,255,255,0.12);
      --text:#f8fafc;
      --muted:#cbd5e1;
      --shadow:0 18px 42px rgba(0,0,0,.32);
      --radius:28px;
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      background:radial-gradient(circle at top, #142042 0%, #0b1020 42%, #08101d 100%);
      color:var(--text);
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }

    body{min-height:100vh}

    .wrap{
      max-width:520px;
      margin:0 auto;
      padding:22px 16px 34px;
    }

    .hero{margin-bottom:18px;}

    .badge{
      display:inline-flex;
      align-items:center;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(139,92,246,.16);
      border:1px solid rgba(255,255,255,.12);
      font-size:12px;
      font-weight:800;
      margin-bottom:14px;
      box-shadow:var(--shadow);
    }

    h1{
      margin:0 0 10px;
      font-size:32px;
      line-height:1.15;
      letter-spacing:-0.7px;
    }

    .sub{
      margin:0;
      color:var(--muted);
      font-size:14px;
      line-height:1.65;
      max-width:32ch;
    }

    .grid{
      display:grid;
      gap:12px;
      margin-top:20px;
    }

    .card{
      display:block;
      text-decoration:none;
      color:inherit;
      background:linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.06));
      border:1px solid rgba(255,255,255,.12);
      border-radius:var(--radius);
      padding:16px 16px 14px;
      box-shadow:var(--shadow);
      transition:transform .16s ease, border-color .16s ease, background .16s ease;
    }

    .card:active{transform:scale(.985)}
    .card:hover{
      border-color:rgba(255,255,255,.18);
      background:linear-gradient(180deg, rgba(255,255,255,.11), rgba(255,255,255,.07));
    }

    .top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:8px;
    }

    .meta{min-width:0;flex:1}

    .label{
      display:inline-block;
      padding:5px 10px;
      border-radius:999px;
      font-size:10px;
      font-weight:900;
      letter-spacing:.2px;
      border:1px solid rgba(255,255,255,.12);
      color:#fff;
      margin-bottom:10px;
    }

    .green{background:rgba(34,197,94,.16)}
    .purple{background:rgba(139,92,246,.18)}

    .title{
      font-size:24px;
      font-weight:900;
      margin:0;
      letter-spacing:-0.4px;
      line-height:1.2;
    }

    .icon{
      width:68px;
      height:68px;
      border-radius:22px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:30px;
      font-weight:900;
      border:1px solid rgba(255,255,255,.1);
      flex-shrink:0;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
    }

    .icon.workout{background:rgba(34,197,94,.14)}
    .icon.wellness{background:rgba(139,92,246,.16)}

    .desc{
      margin:0;
      color:#e7edf8;
      font-size:14px;
      line-height:1.65;
    }

    .points{
      display:flex;
      flex-wrap:wrap;
      gap:7px;
      margin-top:12px;
    }

    .point{
      font-size:11px;
      color:var(--muted);
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.1);
      border-radius:999px;
      padding:6px 10px;
      line-height:1;
    }

    .go{
      margin-top:14px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-size:15px;
      font-weight:900;
      color:#fff;
    }

    .go-left{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .go-dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:#fff;
      opacity:.85;
    }

    .arrow-wrap{
      width:38px;
      height:38px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
      font-size:18px;
      flex-shrink:0;
    }

    .footer{
      margin-top:16px;
      color:var(--muted);
      font-size:12px;
      text-align:center;
      line-height:1.6;
      padding:6px 8px 0;
    }

    @media (max-width:420px){
      h1{font-size:29px}
      .title{font-size:22px}
      .icon{width:62px;height:62px;font-size:28px}
      .sub{max-width:unset}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="badge">멋재이 전용 루틴 허브</div>
      <h1>오늘 필요한 루틴을<br>바로 선택해</h1>
      <p class="sub">운동과 웰니스를 나눠 한눈에 보이게 정리한 메인 화면이야.</p>
    </section>

    <section class="grid">
      <a class="card" href="index-badge-up.html" aria-label="운동 루틴 열기">
        <div class="top">
          <div class="meta">
            <div class="label green">운동 섹션</div>
            <h2 class="title">운동 루틴</h2>
          </div>
          <div class="icon workout">💪</div>
        </div>

        <p class="desc">홈 운동, 타이머, 루틴 진행을 바로 시작하는 화면.</p>

        <div class="points">
          <span class="point">운동 시작</span>
          <span class="point">타이머</span>
          <span class="point">집중 루틴</span>
        </div>

        <div class="go">
          <div class="go-left">
            <span class="go-dot"></span>
            <span>운동 루틴 열기</span>
          </div>
          <div class="arrow-wrap">→</div>
        </div>
      </a>

      <a class="card" href="wellness-routine.html" aria-label="웰니스 루틴 열기">
        <div class="top">
          <div class="meta">
            <div class="label purple">웰니스 섹션</div>
            <h2 class="title">웰니스 루틴</h2>
          </div>
          <div class="icon wellness">🌙</div>
        </div>

        <p class="desc">저속노화, 이명, 수면, 보충제를 한눈에 보는 건강 루틴 화면.</p>

        <div class="points">
          <span class="point">저속노화</span>
          <span class="point">이명 관리</span>
          <span class="point">수면 안정</span>
        </div>

        <div class="go">
          <div class="go-left">
            <span class="go-dot"></span>
            <span>웰니스 루틴 열기</span>
          </div>
          <div class="arrow-wrap">→</div>
        </div>
      </a>
    </section>

    <div class="footer">
      메인에서 원하는 루틴을 선택해서 바로 들어가면 돼.
    </div>
  </div>
</body>
</html>
